spring.application.name=selfpotify

# Configuración de la Fuente de Datos (H2)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Habilitar la Consola de H2 (para ver los datos en el navegador)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuración de JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Clave para registrar el primer administrador via /api/auth/signup-admin
app.admin.signup-key=changeme-admin-key

# Jackson: no fallar si un campo primitivo llega como null en el body
spring.jackson.deserialization.fail-on-null-for-primitives=false