spring.application.name=selfpotify

# Carga variables por instalación desde .env en la raíz del proyecto (opcional).
# Las variables de entorno reales del SO tienen prioridad sobre las de .env.
spring.config.import=optional:file:./.env[.properties]

# Puerto del servidor
server.port=${SERVER_PORT:8080}

# Configuración de la Fuente de Datos
spring.datasource.url=${DB_URL:jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# Consola H2
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=${H2_CONSOLE_PATH:/h2-console}

# JPA / Hibernate
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:create-drop}
spring.jpa.show-sql=${DB_SHOW_SQL:true}

# Credenciales del admin inicial (bootstrap al primer arranque)
app.admin.username=${ADMIN_USERNAME:}
app.admin.password=${ADMIN_PASSWORD:}

# JWT
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Ruta del fichero YAML de configuración runtime del servidor
app.config.path=${APP_CONFIG_PATH:#{systemProperties['user.home'] + '/.selfpotify/config.yml'}}

# Origen del frontend (CORS)
app.web.origin=${WEB_ORIGIN:http://localhost:3000}

# Last.fm API (clasificación de género automática)
app.lastfm.api-key=${LASTFM_API_KEY:}
app.lastfm.base-url=${LASTFM_BASE_URL:https://ws.audioscrobbler.com/2.0/}

# Librería musical: ruta del host (fuera de Docker) y punto de montaje (en Docker).
# SELFPOTIFY_DOCKER lo fija el Dockerfile a true; fuera de Docker queda en false.
app.library.path=${MUSIC_LIBRARY_PATH:}
app.library.docker-path=${MUSIC_LIBRARY_MOUNT:/music}
app.library.docker=${SELFPOTIFY_DOCKER:false}

# Jackson: no fallar si un campo primitivo llega como null en el body
spring.jackson.deserialization.fail-on-null-for-primitives=false

# Límites de upload (logo de la app)
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
