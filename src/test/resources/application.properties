# Test-only overrides. No depende del .env del usuario.
spring.application.name=selfpotify-test

server.port=0

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=false

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

app.admin.username=
app.admin.password=
app.jwt.secret=test-secret-key-for-junit-only-do-not-use-in-production-32+chars
app.jwt.expiration-ms=86400000
app.web.origin=http://localhost:3000

spring.jackson.deserialization.fail-on-null-for-primitives=false
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
