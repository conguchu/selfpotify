services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    environment:
      # Valores fijos para Docker. Tienen prioridad sobre el .env, cuyos valores
      # (SERVER_PORT, WEB_ORIGIN, APP_CONFIG_PATH) son para ejecución local.
      # Ruta de config DENTRO del contenedor (volumen persistente).
      APP_CONFIG_PATH: /data/selfpotify/config.yml
      # Puerto interno que espera nginx (web). No se publica al host: el backend
      # solo es accesible por la red interna del compose, vía nginx.
      SERVER_PORT: 8080
      # Todos los clientes (web y Android/TV) hablan con nginx en :80 (mismo origen).
      WEB_ORIGIN: http://localhost
    volumes:
      - selfpotify-data:/data/selfpotify
      # Montaje de lectura/escritura: además de escanear la música del host, el
      # panel guarda los audios subidos en /music/selfpotify_added (drag & drop).
      - ${MUSIC_LIBRARY_PATH:?Define MUSIC_LIBRARY_PATH en .env apuntando a la carpeta del host con tu música}:/music
    # Solo expuesto en la red interna del compose (como next); nunca al host.
    # Todos los clientes entran por nginx (web) en :80.
    expose:
      - "8080"
    restart: unless-stopped
    networks: [internal]

  next:
    build:
      context: ./front
      args:
        NEXT_PUBLIC_API_BASE: ""
    expose:
      - "3000"
    restart: unless-stopped
    networks: [internal]

  web:
    build: ./docker/web
    depends_on:
      - api
      - next
    ports:
      - "${WEB_PORT:-80}:80"
    restart: unless-stopped
    networks: [internal]

volumes:
  selfpotify-data:

networks:
  internal:
