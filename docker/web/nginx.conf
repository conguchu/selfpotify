server {
  listen 80;
  server_name _;
  client_max_body_size 50m;

  # DNS embebido de Docker en redes definidas por el usuario. Usar un resolver
  # + proxy_pass por variable obliga a nginx a re-resolver la IP de los upstreams
  # en cada petición, en vez de cachearla al arrancar. Así, si se recrea el
  # contenedor `next` o `api` (p.ej. tras `--build`), nginx no se queda apuntando
  # a una IP vieja (causa típica del 502 Bad Gateway).
  resolver 127.0.0.11 valid=10s ipv6=off;

  set $next_upstream http://next:3000;
  set $api_upstream  http://api:8080;

  location /_next/static/ {
    proxy_pass $next_upstream$request_uri;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location /api/ {
    proxy_pass $api_upstream$request_uri;
    include /etc/nginx/conf.d/proxy.inc;
  }

  location /assets/ {
    proxy_pass $api_upstream$request_uri;
    include /etc/nginx/conf.d/proxy.inc;
  }

  location / {
    proxy_pass $next_upstream$request_uri;
    include /etc/nginx/conf.d/proxy.inc;
  }
}
